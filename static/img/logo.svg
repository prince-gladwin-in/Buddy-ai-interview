<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buddyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <filter id="buddyGlow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="85" fill="url(#buddyGradient)" opacity="0.15"/>
  
  <!-- AI Assistant Head (rounded square with friendly design) -->
  <g filter="url(#buddyGlow)">
    <!-- Head -->
    <rect x="60" y="50" width="80" height="85" rx="16" fill="url(#buddyGradient)" stroke="url(#buddyGradient)" stroke-width="1.5"/>
    
    <!-- Left eye -->
    <circle cx="75" cy="70" r="6" fill="#ffffff">
      <animate attributeName="r" values="6;7;6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="70" r="3" fill="url(#buddyGradient)"/>
    
    <!-- Right eye -->
    <circle cx="125" cy="70" r="6" fill="#ffffff">
      <animate attributeName="r" values="6;7;6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="70" r="3" fill="url(#buddyGradient)"/>
    
    <!-- Friendly smile -->
    <path d="M 80 95 Q 100 110 120 95" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Antenna 1 (left) -->
    <line x1="85" y1="50" x2="80" y2="32" stroke="url(#buddyGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="80" cy="28" r="3" fill="url(#buddyGradient)"/>
    
    <!-- Antenna 2 (right) -->
    <line x1="115" y1="50" x2="120" y2="32" stroke="url(#buddyGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="120" cy="28" r="3" fill="url(#buddyGradient)"/>
  </g>

  <!-- Chat/Interview bubble -->
  <g filter="url(#buddyGlow)">
    <path d="M 55 130 Q 50 145 55 155 L 120 155 Q 125 155 125 150 L 125 135 Q 125 130 120 130 L 60 130 Q 55 130 55 135 Z" 
          fill="url(#buddyGradient)" stroke="url(#buddyGradient)" stroke-width="1.5"/>
    
    <!-- Chat lines inside bubble -->
    <line x1="65" y1="138" x2="115" y2="138" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="65" y1="146" x2="105" y2="146" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Spark/AI indicator (small star) -->
  <g filter="url(#buddyGlow)">
    <polygon points="155,45 158,52 165,52 159,57 162,65 155,60 148,65 151,57 145,52 152,52" fill="url(#buddyGradient)"/>
  </g>

  <!-- Pulse circle (representing AI activity) -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#buddyGradient)" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="88;95;88" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
